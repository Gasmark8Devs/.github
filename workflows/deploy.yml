name: Plugin Deploy (Reusable - rsync)

# Deploys a WordPress plugin to staging or production over SSH (rsync).
# Authentication: SSH password via sshpass. More secure alternative: SSH key.
#
# Two environments (each with its own host, user, and password):
# - The job uses `environment: staging` or `production`, so GitHub injects
#   secrets from that specific environment (same names, different values).
#
# GitHub setup:
# 1. Settings -> Environments -> create "staging" and "production"
# 2. In "staging" environment secrets:
#      DEPLOY_HOST     = STAGING server IP or hostname
#      DEPLOY_USER     = STAGING SSH user
#      DEPLOY_PASSWORD = STAGING SSH password
# 3. In "production" environment secrets:
#      same names, but with PRODUCTION values
#
# WordPress plugin path:
# - Set with input `deploy_path`; `~` resolves to the SSH user's home directory.
#
# Optional:
# - After rsync, run CLI sync scripts over SSH (configured via
#   `run_sync_scripts` + `sync_scripts_command`).
#
# Production safety:
# - `confirm_production` must be true for production deployment.
# - Additional protection is recommended via required reviewers in:
#   Settings -> Environments -> production.

on:
  workflow_call:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        type: string
      deploy_path:
        description: 'Remote plugin path relative to SSH user home'
        required: true
        type: string
      php_version:
        description: 'PHP version used to run composer install'
        required: false
        type: string
        default: '8.4'
      confirm_production:
        description: 'Set true to allow production deployment'
        required: false
        type: boolean
        default: false
      run_sync_scripts:
        description: 'Run plugin sync scripts on server after deploy'
        required: false
        type: boolean
        default: false
      sync_scripts_command:
        description: 'Shell command to run in deploy_path when run_sync_scripts is true'
        required: false
        type: string
        default: 'php scripts/sync_eportfolio_data.php && php scripts/sync_activities_detailed.php'
    secrets:
      DEPLOY_HOST:
        required: true
      DEPLOY_USER:
        required: true
      DEPLOY_PASSWORD:
        required: true

jobs:
  deploy:
    name: Deploy - ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      SSHPASS: ${{ secrets.DEPLOY_PASSWORD }}
      DEPLOY_PATH: ${{ inputs.deploy_path }}

    steps:
      - name: Block production without confirmation
        if: ${{ inputs.environment == 'production' && !inputs.confirm_production }}
        run: |
          echo "::error::Production deploy blocked: set confirm_production to true."
          exit 1

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ inputs.php_version }}

      - name: Install Composer dependencies
        run: composer install --no-dev --prefer-dist --no-interaction

      - name: Install sshpass
        run: sudo apt-get update -qq && sudo apt-get install -y sshpass

      - name: Deploy via rsync (SSH password)
        run: |
          rsync -avz --delete \
            -e "sshpass -e ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null" \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.gitignore' \
            --exclude '.env' \
            --exclude '.env.*' \
            --exclude '*.log' \
            --exclude '.claude' \
            --exclude 'docs/' \
            ./ "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ env.DEPLOY_PATH }}/"

      - name: Run plugin sync scripts on server (optional)
        if: ${{ inputs.run_sync_scripts }}
        run: |
          sshpass -e ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "cd ${{ env.DEPLOY_PATH }} && ${{ inputs.sync_scripts_command }}"
